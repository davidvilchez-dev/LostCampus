<svg viewBox="0 0 66 58" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="lcGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#60a5fa" />
      <stop offset="100%" stop-color="#2563eb" />
    </linearGradient>
  </defs>

  <!-- Letra L — blanca, geométrica, gruesa -->
  <path
    d="M3 2 L3 47 L28 47 L28 39 L12 39 L12 2 Z"
    fill="white"
  />

  <!-- Letra C — lente de la lupa (arco azul con degradado), separada de la L -->
  <path
    d="M 46 13 A 16.5 16.5 0 1 0 46 39"
    stroke="url(#lcGrad)"
    stroke-width="8.5"
    stroke-linecap="round"
    fill="none"
  />

  <!-- Mango de la lupa — blanco, diagonal 45° -->
  <line
    x1="45"
    y1="39"
    x2="58"
    y2="52"
    stroke="white"
    stroke-width="5.5"
    stroke-linecap="round"
  />

  <!-- Banda/anillo azul donde el mango conecta con el lente -->
  <line
    x1="43"
    y1="37"
    x2="47"
    y2="41"
    stroke="#3b82f6"
    stroke-width="3.5"
    stroke-linecap="round"
  />
</svg>